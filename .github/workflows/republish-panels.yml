name: Republish Panels

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  republish-panels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Republish panels
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
        run: |
          node src/publish-verification-panel.js
          node src/publish-support-rules.js
          node src/publish-server-rules.js
          node src/publish-how-it-works.js
          node src/publish-plans.js
